name: Weekly Buffett Backtest

on:
  # 每週日 23:00 UTC,避開 daily scan 22:30 UTC
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      top_n:
        description: 'BUY 籃子取前 N 檔'
        default: '10'
        required: false

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run backtest
        run: |
          python scripts/run_backtest.py --quiet \
            --top-n ${{ github.event.inputs.top_n || '10' }}

      - name: Commit & push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add output/backtest.json output/backtest_summary.md simple-html/backtest.html
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "weekly backtest — $(date -u +'%Y-%m-%d')"
            git push
          fi
